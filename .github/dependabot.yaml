version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
    cooldown:
      default-days: 5
    groups:
      minor-or-patch:
        applies-to: version-updates
        update-types:
          - minor
          - patch
  - package-ecosystem: docker
    commit-message:
      prefix: "feat(container)"
    directories:
      - "**/*"
    schedule:
      interval: daily
    cooldown:
      default-days: 5
    groups:
      minor-or-patch:
        applies-to: version-updates
        update-types:
          - minor
          - patch
