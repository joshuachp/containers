name: build and push
on:
  workflow_dispatch:
    inputs:
      container:
        type: string
        required: true
        description: Container that you need to build
  workflow_call:
    inputs:
      container:
        type: string
        required: true
        description: Container that you need to build
permissions:
  contents: read
defaults:
  run:
    shell: bash
env:
  GH_TOKEN: ${{ github.token }}
jobs:
  push_to_registry:
    name: push / ${{ inputs.container }}
    runs-on: ubuntu-24.04
    steps:
      - name: Check out the repo
        uses: actions/checkout@v7
      - name: Get latest ${{ inputs.container }} tag
        id: tag
        run: |
          set -x
          tag=$(
            gh release list --repo "${{ github.repository }}" \
                --exclude-drafts --exclude-pre-releases \
                --json tagName -q '.[].tagName' |
              grep '${{ inputs.container }}-[0-9].[0-9].[0-9]' |
              sort --version-sort |
              tail -n 1 |
              sed -e 's/${{ inputs.container }}-//'
          )
          echo "version=$tag" >> "$GITHUB_OUTPUT"
      - name: Log in to Docker Hub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9
        with:
          images: joshuachp/${{ inputs.container }}
          tags: |
            type=raw,value=${{ steps.tag.outputs.version }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        with:
          context: ./${{ inputs.container }}
          file: ./${{ inputs.container }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
