name: build and push
on:
  workflow_dispatch:
    inputs:
      container:
        type: string
        required: true
        description: Container that you need to build
  workflow_call:
    inputs:
      container:
        type: string
        required: true
        description: Container that you need to build
permissions:
  contents: read
defaults:
  run:
    shell: bash
env:
  GH_TOKEN: ${{ github.token }}
jobs:
  push_to_registry:
    name: push / ${{ inputs.container }}
    runs-on: ubuntu-24.04
    steps:
      - name: Check out the repo
        uses: actions/checkout@v6
      - name: Get latest ${{ inputs.container }} tag
        id: tag
        run: |
          set -x
          tag=$(
            gh release list --repo "${{ github.repository }}" \
                --exclude-drafts --exclude-pre-releases \
                --json tagName -q '.[].tagName' |
              grep '${{ inputs.container }}-[0-9].[0-9].[0-9]' |
              sort --version-sort |
              tail -n 1 |
              sed -e 's/${{ inputs.container }}-//'
          )
          echo "version=$tag" >> "$GITHUB_OUTPUT"
      - name: Log in to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@4f5b5234679dfa19837d4942067c97d7df43b7b3
        with:
          images: joshuachp/${{ inputs.container }}
          tags: |
            type=raw,value=${{ steps.tag.outputs.version }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@3b5e8027fcad23fda98b2e3ac259d8d67585f671
        with:
          context: ./${{ inputs.container }}
          file: ./${{ inputs.container }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
